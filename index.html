<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 Prediction League</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        button {
            padding: 8px 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        input, select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>F1 2026 Prediction League</h1>

        <!-- User Login -->
        <div id="login">
            <h2>Login</h2>
            <input type="text" id="userName" placeholder="Your Name" />
            <button onclick="login()">Join League</button>
        </div>

        <!-- Prediction Form (hidden until login) -->
        <div id="predictionForm" style="display: none;">
            <h2>Make Your Predictions</h2>
            <h3>Rank the Teams</h3>
            <select id="team1"><option value="Mercedes">Mercedes</option><option value="Red Bull">Red Bull</option><option value="Ferrari">Ferrari</option></select>
            <select id="team2"><option value="Mercedes">Mercedes</option><option value="Red Bull">Red Bull</option><option value="Ferrari">Ferrari</option></select>
            <select id="team3"><option value="Mercedes">Mercedes</option><option value="Red Bull">Red Bull</option><option value="Ferrari">Ferrari</option></select>

            <h3>Rank the Drivers</h3>
            <select id="driver1"><option value="Hamilton">Hamilton</option><option value="Verstappen">Verstappen</option><option value="Leclerc">Leclerc</option></select>
            <select id="driver2"><option value="Hamilton">Hamilton</option><option value="Verstappen">Verstappen</option><option value="Leclerc">Leclerc</option></select>
            <select id="driver3"><option value="Hamilton">Hamilton</option><option value="Verstappen">Verstappen</option><option value="Leclerc">Leclerc</option></select>

            <button onclick="savePredictions()">Save Predictions</button>
        </div>

        <!-- Results Table (hidden until predictions are saved) -->
        <div id="results" style="display: none;">
            <h2>League Results</h2>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Team Predictions</th>
                        <th>Driver Predictions</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // Firebase configuration (replace with your own)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Login function
        function login() {
            const userName = document.getElementById("userName").value;
            if (userName) {
                localStorage.setItem("userName", userName);
                document.getElementById("login").style.display = "none";
                document.getElementById("predictionForm").style.display = "block";
                loadResults();
            }
        }

        // Save predictions to Firebase
        function savePredictions() {
            const userName = localStorage.getItem("userName");
            const predictions = {
                teams: [
                    document.getElementById("team1").value,
                    document.getElementById("team2").value,
                    document.getElementById("team3").value
                ],
                drivers: [
                    document.getElementById("driver1").value,
                    document.getElementById("driver2").value,
                    document.getElementById("driver3").value
                ],
                score: 0
            };
            database.ref('predictions/' + userName).set(predictions);
            loadResults();
        }

        // Load and display results
        function loadResults() {
            database.ref('predictions').once('value').then((snapshot) => {
                const resultsBody = document.getElementById("resultsBody");
                resultsBody.innerHTML = "";
                snapshot.forEach((childSnapshot) => {
                    const user = childSnapshot.key;
                    const data = childSnapshot.val();
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${user}</td>
                        <td>${data.teams.join(", ")}</td>
                        <td>${data.drivers.join(", ")}</td>
                        <td>${data.score}</td>
                    `;
                    resultsBody.appendChild(row);
                });
                document.getElementById("results").style.display = "block";
            });
        }
    </script>
</body>
</html>
<script>
    // Fetch drivers and constructors from the F1 Fantasy API
    async function loadF1Data() {
        try {
            const response = await fetch('https://fantasy.formula1.com/feeds/drivers/1_en.json?buster=20260302131625');
            const data = await response.json();
            const drivers = data.drivers;
            const constructors = data.constructors;

            // Populate driver dropdowns
            const driverSelects = ['driver1', 'driver2', 'driver3'];
            driverSelects.forEach(selectId => {
                const select = document.getElementById(selectId);
                select.innerHTML = '';
                drivers.forEach(driver => {
                    const option = document.createElement('option');
                    option.value = driver.id;
                    option.textContent = `${driver.first_name} ${driver.last_name} (${driver.team_name})`;
                    select.appendChild(option);
                });
            });

            // Populate constructor dropdowns
            const constructorSelects = ['team1', 'team2', 'team3'];
            constructorSelects.forEach(selectId => {
                const select = document.getElementById(selectId);
                select.innerHTML = '';
                constructors.forEach(constructor => {
                    const option = document.createElement('option');
                    option.value = constructor.id;
                    option.textContent = constructor.name;
                    select.appendChild(option);
                });
            });

            console.log("Data loaded:", data);
        } catch (error) {
            console.error("Error loading F1 data:", error);
        }
    }

    // Call this function when the page loads
    window.onload = loadF1Data;
</script>
