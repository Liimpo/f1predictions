<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 Prediction League</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <h1>F1 2026 Prediction League</h1>

        <!-- Login Section -->
        <div id="login">
            <h2>Login</h2>
            <input type="text" id="userName" placeholder="Your Name" />
            <button onclick="login()">Join League</button>
        </div>

        <!-- Prediction Form (hidden until login) -->
        <div id="predictionForm" style="display: none;">
            <h2>Make Your Predictions</h2>

            <h3>Rank the Teams</h3>
            <select id="team1"><option value="">Select Team</option></select>
            <select id="team2"><option value="">Select Team</option></select>
            <select id="team3"><option value="">Select Team</option></select>

            <h3>Rank the Drivers</h3>
            <select id="driver1"><option value="">Select Driver</option></select>
            <select id="driver2"><option value="">Select Driver</option></select>
            <select id="driver3"><option value="">Select Driver</option></select>

            <button onclick="savePredictions()">Save Predictions</button>
        </div>

        <!-- Results Table (hidden until predictions are saved) -->
        <div id="results" style="display: none;">
            <h2>League Results</h2>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Team Predictions</th>
                        <th>Driver Predictions</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
