<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 Prediction League</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        button {
            padding: 8px 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        input, select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }
        #login, #predictionForm, #results {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>F1 2026 Prediction League</h1>

        <!-- Login Section -->
        <div id="login">
            <h2>Join the League</h2>
            <input type="text" id="userName" placeholder="Enter Your Username" />
            <button onclick="login()">Join</button>
        </div>

        <!-- Prediction Form (hidden until login) -->
        <div id="predictionForm" style="display: none;">
            <h2>Make Your Predictions</h2>
            <h3>Rank the Teams</h3>
            <select id="team1"><option value="">Select Team</option></select>
            <select id="team2"><option value="">Select Team</option></select>
            <select id="team3"><option value="">Select Team</option></select>

            <h3>Rank the Drivers</h3>
            <select id="driver1"><option value="">Select Driver</option></select>
            <select id="driver2"><option value="">Select Driver</option></select>
            <select id="driver3"><option value="">Select Driver</option></select>

            <button onclick="savePredictions()">Save Predictions</button>
        </div>

        <!-- Results Table (hidden until predictions are saved) -->
        <div id="results" style="display: none;">
            <h2>League Results</h2>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Team Predictions</th>
                        <th>Driver Predictions</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // Replace with your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAkM3mKk9w4zylsMHlBiWZpfSRDbCXVWsE",
            authDomain: "f1-prediction-68d4a.firebaseapp.com",
            projectId: "f1-prediction-68d4a",
            storageBucket: "f1-prediction-68d4a.firebasestorage.app",
            messagingSenderId: "1003727143580",
            appId: "1:1003727143580:web:aa6deba67bb51f3abfa359"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Simple username login
        function login() {
            const userName = document.getElementById("userName").value.trim();
            if (!userName) {
                alert("Please enter a username!");
                return;
            }
            localStorage.setItem("userName", userName);
            document.getElementById("login").style.display = "none";
            document.getElementById("predictionForm").style.display = "block";
            loadF1Data();
            loadResults();
        }

        // Save predictions
        function savePredictions() {
            const userName = localStorage.getItem("userName");
            if (!userName) {
                alert("Please log in first!");
                return;
            }

            const predictions = {
                userName: userName,
                teams: [
                    document.getElementById("team1").value,
                    document.getElementById("team2").value,
                    document.getElementById("team3").value
                ],
                drivers: [
                    document.getElementById("driver1").value,
                    document.getElementById("driver2").value,
                    document.getElementById("driver3").value
                ],
                score: 0
            };

            database.ref('predictions/' + userName).set(predictions)
                .then(() => loadResults())
                .catch((error) => console.error("Error saving predictions:", error));
        }

        // Load and display results
        function loadResults() {
            database.ref('predictions').once('value')
                .then((snapshot) => {
                    const resultsBody = document.getElementById("resultsBody");
                    resultsBody.innerHTML = "";
                    snapshot.forEach((childSnapshot) => {
                        const data = childSnapshot.val();
                        const row = document.createElement("tr");
                        row.innerHTML = `
                            <td>${data.userName}</td>
                            <td>${data.teams.join(", ")}</td>
                            <td>${data.drivers.join(", ")}</td>
                            <td>${data.score}</td>
                        `;
                        resultsBody.appendChild(row);
                    });
                    document.getElementById("results").style.display = "block";
                })
                .catch((error) => console.error("Error loading results:", error));
        }

        // Load F1 data from the official API
        async function loadF1Data() {
            try {
                const response = await fetch('https://fantasy.formula1.com/feeds/drivers/1_en.json?buster=20260302131625');
                if (!response.ok) throw new Error("Failed to fetch F1 data");
                const data = await response.json();
                const drivers = data.drivers;
                const constructors = data.constructors;

                // Populate driver dropdowns
                const driverSelects = ['driver1', 'driver2', 'driver3'];
                driverSelects.forEach(selectId => {
                    const select = document.getElementById(selectId);
                    select.innerHTML = '<option value="">Select Driver</option>';
                    drivers.forEach(driver => {
                        const option = document.createElement('option');
                        option.value = `${driver.first_name} ${driver.last_name}`;
                        option.textContent = `${driver.first_name} ${driver.last_name} (${driver.team_name})`;
                        select.appendChild(option);
                    });
                });

                // Populate constructor dropdowns
                const constructorSelects = ['team1', 'team2', 'team3'];
                constructorSelects.forEach(selectId => {
                    const select = document.getElementById(selectId);
                    select.innerHTML = '<option value="">Select Team</option>';
                    constructors.forEach(constructor => {
                        const option = document.createElement('option');
                        option.value = constructor.name;
                        option.textContent = constructor.name;
                        select.appendChild(option);
                    });
                });
            } catch (error) {
                console.error("Error loading F1 data:", error);
            }
        }

        // Check for saved username on page load
        window.onload = () => {
            const userName = localStorage.getItem("userName");
            if (userName) {
                document.getElementById("login").style.display = "none";
                document.getElementById("predictionForm").style.display = "block";
                loadF1Data();
                loadResults();
            }
        };
    </script>
</body>
</html>
